name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skill package
        run: bash tools/build-skills.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
