<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>

  <rect x="20" y="110" width="180" height="100" rx="10" fill="#f3e8ff" stroke="#8e44ad"/>
  <text x="110" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">专业早期教育资料</text>
  <text x="110" y="168" text-anchor="middle" font-size="12" fill="#555">（去来源 / 去个人信息）</text>
  <text x="110" y="188" text-anchor="middle" font-size="12" fill="#555">只留干货</text>

  <rect x="250" y="40" width="200" height="240" rx="10" fill="#eaf7ee" stroke="#27ae60"/>
  <text x="350" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">知识底座 knowledge/</text>
  <text x="350" y="105" text-anchor="middle" font-size="13" fill="#333">skill-packages/ 23 篇方法包</text>
  <text x="350" y="140" text-anchor="middle" font-size="13" fill="#333">atoms/ 846 条知识原子</text>
  <text x="350" y="175" text-anchor="middle" font-size="13" fill="#333">glossary.md 概念词典</text>
  <text x="350" y="215" text-anchor="middle" font-size="12" fill="#555">助手先读对应文件</text>
  <text x="350" y="235" text-anchor="middle" font-size="12" fill="#555">再作答，不凭空编</text>

  <rect x="500" y="110" width="170" height="100" rx="10" fill="#fff4e6" stroke="#d9822b"/>
  <text x="585" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">edu 工具箱</text>
  <text x="585" y="170" text-anchor="middle" font-size="12" fill="#555">/edu 主入口</text>
  <text x="585" y="190" text-anchor="middle" font-size="12" fill="#555">15 个 edu-* 子技能</text>

  <line x1="200" y1="160" x2="245" y2="160" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="450" y1="160" x2="495" y2="160" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
</svg>
