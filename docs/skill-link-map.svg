  </defs>

  <rect x="20" y="210" width="130" height="56" rx="8" fill="#eaf2fb" stroke="#2c6fbb"/>
  <text x="85" y="243" text-anchor="middle" font-size="14" fill="#222">用户真实处境</text>

  <rect x="210" y="192" width="180" height="96" rx="10" fill="#fff4e6" stroke="#d9822b"/>
  <text x="300" y="222" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">/edu 主入口</text>
  <text x="300" y="244" text-anchor="middle" font-size="12" fill="#444">新手教程 · 任务前路由</text>
  <text x="300" y="262" text-anchor="middle" font-size="12" fill="#444">· 任务后导航</text>

  <g fill="#eaf7ee" stroke="#27ae60">
    <rect x="460" y="30" width="200" height="56" rx="8"/>
    <rect x="460" y="110" width="200" height="56" rx="8"/>
    <rect x="460" y="190" width="200" height="56" rx="8"/>
    <rect x="460" y="270" width="200" height="56" rx="8"/>
    <rect x="460" y="350" width="200" height="56" rx="8"/>
  </g>
  <g font-size="14" fill="#222" text-anchor="middle">
    <text x="560" y="63">诊断层（9 个）</text>
    <text x="560" y="143">方案层（10 个）</text>
    <text x="560" y="223">决策层（1 个）</text>
