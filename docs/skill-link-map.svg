<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#555"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="20" y="180" width="130" height="56" rx="8" fill="#eaf2fb" stroke="#2c6fbb"/>
  <text x="85" y="213" text-anchor="middle" font-size="14" fill="#222">用户真实处境</text>

  <rect x="210" y="160" width="180" height="96" rx="10" fill="#fff4e6" stroke="#d9822b"/>
  <text x="300" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">/edu 主入口</text>
  <text x="300" y="212" text-anchor="middle" font-size="12" fill="#444">新手教程 · 任务前路由</text>
  <text x="300" y="230" text-anchor="middle" font-size="12" fill="#444">· 任务后导航</text>

  <g fill="#eaf7ee" stroke="#27ae60">
    <rect x="460" y="30" width="200" height="56" rx="8"/>
    <rect x="460" y="120" width="200" height="56" rx="8"/>
    <rect x="460" y="210" width="200" height="56" rx="8"/>
    <rect x="460" y="300" width="200" height="56" rx="8"/>
  </g>
  <g font-size="14" fill="#222" text-anchor="middle">
    <text x="560" y="63">诊断层（6 个）</text>
    <text x="560" y="153">方案层（6 个）</text>
    <text x="560" y="243">决策层（1 个）</text>
    <text x="560" y="333">记录层（2 个）</text>
  </g>

  <line x1="150" y1="208" x2="205" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="190" x2="455" y2="60" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="200" x2="455" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="215" x2="455" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="225" x2="455" y2="330" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M460,300 C400,400 320,400 300,258" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow2)"/>
  <text x="360" y="380" text-anchor="middle" font-size="11" fill="#c0392b">任务后导航：读上一步结论，回 /edu 选下一步</text>
