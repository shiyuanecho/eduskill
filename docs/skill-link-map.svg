  </g>

  <line x1="150" y1="238" x2="205" y2="238" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="215" x2="455" y2="60" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="225" x2="455" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="235" x2="455" y2="220" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="245" x2="455" y2="300" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="255" x2="455" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M460,380 C400,480 320,480 300,288" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow2)"/>
  <text x="360" y="440" text-anchor="middle" font-size="11" fill="#c0392b">任务后导航：读上一步结论，回 /edu 选下一步</text>
